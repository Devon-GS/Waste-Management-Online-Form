<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Waste Management Form{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT3MRlCfR8zN0B6M9gWcFv8"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-shell sticky-top">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">Waste Form</a>
        <div class="navbar-nav ms-auto gap-2">
          <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="{{ url_for('index') }}">New Form</a>
          <a class="nav-link {% if active_page == 'forms' %}active{% endif %}" href="{{ url_for('forms_list') }}">Saved Forms</a>
        </div>
      </div>
    </nav>

    <main class="page-shell">
      <div class="container py-4 py-lg-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="mb-4">
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} shadow-sm" role="alert">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
      </div>
    </main>
  </body>
</html>
